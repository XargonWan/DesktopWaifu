<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">DesktopWaifu Icon</title>
  <desc id="desc">A dark neon desktop companion icon with clipped corners, cat ears, and a chat pulse.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040913"/>
      <stop offset="60%" stop-color="#091726"/>
      <stop offset="100%" stop-color="#12253e"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65f7ff"/>
      <stop offset="55%" stop-color="#32b7ff"/>
      <stop offset="100%" stop-color="#4e85ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="48%">
      <stop offset="0%" stop-color="#45d8ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#45d8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

